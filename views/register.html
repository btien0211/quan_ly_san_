<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký Khách Hàng</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .register-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .btn-submit { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-submit:hover { background-color: #218838; }
        .link-login { display: block; text-align: center; margin-top: 15px; text-decoration: none; color: #007bff; }
    </style>
</head>
<body>

    <div class="register-container">
        <h2>Đăng Ký Tài Khoản</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>Họ và Tên</label>
                <input type="text" id="fullName" required placeholder="Nhập tên của bạn">
            </div>
            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="text" id="phone" required placeholder="Nhập số điện thoại">
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" required placeholder="Tạo mật khẩu">
            </div>
            <button type="submit" class="btn-submit">Đăng Ký Ngay</button>
        </form>
        <a href="/" class="link-login">⬅ Quay lại trang Đặt Sân</a>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Ngăn trang bị load lại khi bấm nút

            const fullName = document.getElementById('fullName').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ full_name: fullName, phone: phone, password: password })
                });

                const result = await response.json();
                
                if (response.ok) {
                    alert(result.message);
                    window.location.href = '/'; // Đăng ký xong tự động chuyển về trang Đặt sân
                } else {
                    alert("Lỗi: " + result.message);
                }
            } catch (error) {
                console.error("Lỗi:", error);
            }
        });
    </script>

</body>
</html>
