<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .btn-submit { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-submit:hover { background-color: #0056b3; }
        .link-register { display: block; text-align: center; margin-top: 15px; text-decoration: none; color: #28a745; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Đăng Nhập</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="text" id="phone" required placeholder="Nhập số điện thoại">
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" required placeholder="Nhập mật khẩu">
            </div>
            <button type="submit" class="btn-submit">Đăng Nhập</button>
        </form>
        <a href="/register" class="link-register">Chưa có tài khoản? Đăng ký ngay</a>
        <a href="/" class="link-register" style="color: gray; margin-top: 10px;">⬅ Quay lại Trang chủ</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });

                const result = await response.json();
                
                if (response.ok) {
                    alert(result.message);
                    // LƯU THÔNG TIN KHÁCH HÀNG VÀO TRÌNH DUYỆT
                    localStorage.setItem('currentUser', JSON.stringify(result.user));
                    window.location.href = '/'; // Chuyển về trang đặt sân
                } else {
                    alert("Lỗi: " + result.message);
                }
            } catch (error) {
                console.error("Lỗi:", error);
            }
        });
    </script>

</body>
</html>
